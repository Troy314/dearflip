<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DFlip / examples</title>
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<!-- Flipbook StyleSheet -->
<link href="../dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
<!-- Icons Stylesheet -->
<link href="../dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

<style>
  /* Shared wrapper provides the positioning context */
  #book-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
  }

  /* Overlay floats over the top-right of the wrapper */
  #clock-overlay {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 120px;
    height: 120px;
    z-index: 9999;
    pointer-events: none;
    border-radius: 50%;
    box-shadow: 0 4px 18px rgba(0,0,0,0.55);
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  #clock-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #clock-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-xs-12">
      <h2>You can now create FlipBook with just HTML (Recommended)</h2>
      All you need is to include the necessary files.
<pre>
<code class="language-html">&lt;div class="_df_book" source="http://www.yourssite.com/books/dflip manual.pdf"&gt;&lt;/div&gt;</code></pre>
    </div>

    <div class="col-xs-12" style="padding-bottom:30px">
      <!-- Shared wrapper: provides the position:relative context -->
      <div id="book-wrapper">
        <!--Normal Flipbook-->
        <div class="_df_book" height="500" webgl="true" backgroundcolor="teal"
             source="example-assets/books/serotine.pdf"
             id="df_manual_book">
        </div>

        <!-- GIF overlay – positioned over the book via the wrapper -->
        <div id="clock-overlay">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/8/8a/AnalogClockAnimation1_2hands_1h_in_6sec.gif"
            alt="Animated analog clock">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="../dflip/js/libs/jquery.min.js" type="text/javascript"></script>
<!-- Flipbook main Js file -->
<script src="../dflip/js/dflip.min.js" type="text/javascript"></script>

<script>
(function () {
  var overlay  = document.getElementById('clock-overlay');
  var bookWrap = document.getElementById('df_manual_book');

  /**
   * Position the overlay relative to the flipbook wrapper.
   * Called once on load and again on window resize.
   */
  function positionOverlay() {
    var rect = bookWrap.getBoundingClientRect();
    // Place it inside the top-right corner of the book container
    overlay.style.top  = '200px';
    overlay.style.right = '400px';
  }

  /**
   * Show or hide the overlay depending on whether page 1 is visible.
   * DFlip stores the current page in the flipbook's data / jQuery object.
   * We check both the standard jQuery data key and a DOM attribute.
   */
  function syncOverlay() {
    var currentPage = 1; // default assumption

    // Try to read from DFlip's jQuery data (key varies by version)
    if (window.jQuery) {
      var $book = jQuery('#df_manual_book');
      var dfData = $book.data('dflip') || $book.data('3dflipbook') || $book.data('df');
      if (dfData && dfData.currentPage !== undefined) {
        currentPage = dfData.currentPage;
      } else if (dfData && dfData.page !== undefined) {
        currentPage = dfData.page;
      }
    }

    // Page 1 → show overlay; any other page → hide
    if (currentPage === 1) {
      overlay.classList.add('visible');
    } else {
      overlay.classList.remove('visible');
    }
  }

  /**
   * Normalise whatever DFlip passes as the page argument to a plain integer.
   */
  function parsePage(page) {
    if (page === null || page === undefined) return null;
    if (typeof page === 'number') return page;
    if (typeof page === 'object') {
      return page.page || page.currentPage || page.pageNumber || null;
    }
    var n = parseInt(page, 10);
    return isNaN(n) ? null : n;
  }

  function handlePageChange(page) {
    var p = parsePage(page);
    // If we couldn't parse, fall back to polling the DOM attribute
    if (p === null) p = readPageFromDOM();
    if (p === 1) {
      overlay.classList.add('visible');
    } else {
      overlay.classList.remove('visible');
    }
  }

  /**
   * Fallback: read the current page from DFlip's data stored on the element.
   */
  function readPageFromDOM() {
    if (!window.jQuery) return null;
    var $book = jQuery('#df_manual_book');
    var d = $book.data('dflip') || $book.data('3dflipbook') || $book.data('df');
    if (!d) return null;
    return d.currentPage || d.page || null;
  }

  /**
   * Poll-based safety net: every 300 ms check the real current page so we
   * never get stuck in the wrong state if a callback was missed.
   */
  function startPolling() {
    setInterval(function () {
      var p = readPageFromDOM();
      if (p === null) return; // book not ready yet
      if (p === 1) {
        overlay.classList.add('visible');
      } else {
        overlay.classList.remove('visible');
      }
    }, 300);
  }

  /**
   * DFlip exposes global callbacks via window.DFLIP.defaults.
   * We hook into onReady (book loaded) and onChange / onFlip (page turned).
   */
  function initDFlipHooks() {
    if (!window.DFLIP) {
      setTimeout(initDFlipHooks, 100);
      return;
    }

    var defaults = window.DFLIP.defaults;

    // ---- onReady ----
    var _origReady = defaults.onReady;
    defaults.onReady = function (flipbook) {
      if (_origReady) _origReady.call(this, flipbook);
      positionOverlay();
      overlay.classList.add('visible'); // page 1 on load
      startPolling(); // belt-and-suspenders for missed callbacks
    };

    // ---- onFlip (fired on every page turn in most DFlip versions) ----
    var _origFlip = defaults.onFlip;
    defaults.onFlip = function (flipbook, page) {
      if (_origFlip) _origFlip.call(this, flipbook, page);
      // DFlip sometimes passes the *destination* page, sometimes the flipbook object
      var p = parsePage(page);
      if (p === null && flipbook) p = parsePage(flipbook.currentPage || flipbook.page);
      handlePageChange(p !== null ? p : readPageFromDOM());
    };

    // ---- onChange (alternative callback name in some builds) ----
    var _origChange = defaults.onChange;
    defaults.onChange = function (flipbook, page) {
      if (_origChange) _origChange.call(this, flipbook, page);
      var p = parsePage(page);
      if (p === null && flipbook) p = parsePage(flipbook.currentPage || flipbook.page);
      handlePageChange(p !== null ? p : readPageFromDOM());
    };

    // ---- onPageLoad (fired after each individual page renders) ----
    var _origPageLoad = defaults.onPageLoad;
    defaults.onPageLoad = function (flipbook, page) {
      if (_origPageLoad) _origPageLoad.call(this, flipbook, page);
      var p = parsePage(page);
      if (p === null && flipbook) p = parsePage(flipbook.currentPage || flipbook.page);
      handlePageChange(p !== null ? p : readPageFromDOM());
    };
  }

  // Start hooking as early as possible
  initDFlipHooks();

  // Keep overlay in position if the window is resized
  window.addEventListener('resize', positionOverlay);
})();
</script>
</body>
</html>
