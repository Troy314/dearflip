<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DFlip / examples</title>
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<!-- Flipbook StyleSheet -->
<link href="../dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
<!-- Icons Stylesheet -->
<link href="../dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

<style>
  /* Fixed to viewport so CSS transforms on the book canvas don't move it */
  #clock-overlay {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 9999;
    pointer-events: none;
    border-radius: 50%;
    box-shadow: 0 4px 18px rgba(0,0,0,0.55);
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s ease, top 0.05s linear, right 0.05s linear;
    visibility: hidden; /* hidden until JS places it correctly */
  }

  #clock-overlay.placed {
    visibility: visible;
  }

  #clock-overlay.page-visible {
    opacity: 1;
  }

  #clock-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-xs-12">
      <h2>You can now create FlipBook with just HTML (Recommended)</h2>
      All you need is to include the necessary files.
<pre>
<code class="language-html">&lt;div class="_df_book" source="http://www.yourssite.com/books/dflip manual.pdf"&gt;&lt;/div&gt;</code></pre>
    </div>

    <div class="col-xs-12" style="padding-bottom:30px">
      <!-- Shared wrapper: provides the position:relative context -->
      <div id="book-wrapper">
        <!--Normal Flipbook-->
        <div class="_df_book" height="500" webgl="true" backgroundcolor="teal"
             source="example-assets/books/serotine.pdf"
             id="df_manual_book">
        </div>

        <!-- GIF overlay – positioned over the book via the wrapper -->
        <div id="clock-overlay">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/8/8a/AnalogClockAnimation1_2hands_1h_in_6sec.gif"
            alt="Animated analog clock">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="../dflip/js/libs/jquery.min.js" type="text/javascript"></script>
<!-- Flipbook main Js file -->
<script src="../dflip/js/dflip.min.js" type="text/javascript"></script>

<script>
(function () {
  var overlay  = document.getElementById('clock-overlay');
  var bookEl   = document.getElementById('df_manual_book');

  // ── Margin from top-right corner of the rendered book page (px) ──
  var MARGIN_TOP   = 20;
  var MARGIN_RIGHT = 20;
  var OVERLAY_SIZE = 120;

  var onPage1 = true; // page 1 is shown on load

  // ─────────────────────────────────────────────────────────────────
  // findPageCanvas
  // DFlip renders each page into a <canvas> (WebGL) or <img> inside
  // .df-page or .df-page-front elements.  We locate the first-page
  // surface so we can track its real viewport rect even after zoom/pan.
  // ─────────────────────────────────────────────────────────────────
  function findPageSurface() {
    // Try WebGL canvas first (webgl="true")
    var canvas = bookEl.querySelector('canvas');
    if (canvas) return canvas;
    // Fallback: first .df-page or .df-page-front child
    var page = bookEl.querySelector('.df-page-front, .df-page, .df-book-page');
    if (page) return page;
    // Last resort: the book element itself
    return bookEl;
  }

  // ─────────────────────────────────────────────────────────────────
  // positionOverlay
  // Reads the *current* viewport rect of the rendered surface (which
  // changes every frame while the user zooms/pans) and pins the
  // overlay to its top-right corner using fixed coordinates.
  // ─────────────────────────────────────────────────────────────────
  function positionOverlay() {
    var surface = findPageSurface();
    var rect    = surface.getBoundingClientRect();

    // top-right of the surface, inset by the margin values
    var top   = rect.top  + MARGIN_TOP;
    var right = window.innerWidth - rect.right + MARGIN_RIGHT;

    // Clamp so the overlay never leaves the viewport
    top   = Math.max(0, Math.min(top,   window.innerHeight - OVERLAY_SIZE));
    right = Math.max(0, Math.min(right, window.innerWidth  - OVERLAY_SIZE));

    overlay.style.top   = top   + 'px';
    overlay.style.right = right + 'px';
    overlay.classList.add('placed');
  }

  // ─────────────────────────────────────────────────────────────────
  // Continuous tracking loop via requestAnimationFrame
  // This is the key fix: we reposition every single frame, so zoom,
  // pan, resize, and browser-zoom all stay in sync automatically.
  // ─────────────────────────────────────────────────────────────────
  function trackLoop() {
    positionOverlay();
    requestAnimationFrame(trackLoop);
  }

  // ─────────────────────────────────────────────────────────────────
  // Page-visibility helpers
  // ─────────────────────────────────────────────────────────────────
  function showOverlay() {
    onPage1 = true;
    overlay.classList.add('page-visible');
  }

  function hideOverlay() {
    onPage1 = false;
    overlay.classList.remove('page-visible');
  }

  function parsePage(page) {
    if (page === null || page === undefined) return null;
    if (typeof page === 'number') return page;
    if (typeof page === 'object') {
      return page.page || page.currentPage || page.pageNumber || null;
    }
    var n = parseInt(page, 10);
    return isNaN(n) ? null : n;
  }

  function readPageFromDOM() {
    if (!window.jQuery) return null;
    var d = jQuery('#df_manual_book').data('dflip') ||
            jQuery('#df_manual_book').data('3dflipbook') ||
            jQuery('#df_manual_book').data('df');
    return d ? (d.currentPage || d.page || null) : null;
  }

  function handlePageChange(page) {
    var p = parsePage(page);
    if (p === null) p = readPageFromDOM();
    if (p === 1) showOverlay(); else hideOverlay();
  }

  // ─────────────────────────────────────────────────────────────────
  // DFlip hooks
  // ─────────────────────────────────────────────────────────────────
  function initDFlipHooks() {
    if (!window.DFLIP) { setTimeout(initDFlipHooks, 100); return; }

    var d = window.DFLIP.defaults;

    // onReady
    var _oR = d.onReady;
    d.onReady = function (fb) {
      if (_oR) _oR.call(this, fb);
      showOverlay();                    // page 1 on load
      trackLoop();                      // start the RAF tracking loop
      // 300 ms poll as belt-and-suspenders for page state
      setInterval(function () {
        var p = readPageFromDOM();
        if (p === null) return;
        if (p === 1) showOverlay(); else hideOverlay();
      }, 300);
    };

    function wrapCb(orig, key) {
      d[key] = function (fb, page) {
        if (orig) orig.call(this, fb, page);
        var p = parsePage(page);
        if (p === null && fb) p = parsePage(fb.currentPage || fb.page);
        handlePageChange(p !== null ? p : readPageFromDOM());
      };
    }

    wrapCb(d.onFlip,     'onFlip');
    wrapCb(d.onChange,   'onChange');
    wrapCb(d.onPageLoad, 'onPageLoad');
  }

  initDFlipHooks();
})();
</script>
</body>
</html>
