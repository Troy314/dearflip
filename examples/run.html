<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipbook</title>

  <!-- DearFlip CSS (from jsDelivr as recommended in the repo) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/css/dflip.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/css/themify-icons.min.css">

  <style>
    body {
      margin: 0;
      background: #222;
    }

    /* Wrapper must be relative so the overlay can be positioned inside it */
    #flipbook-wrapper {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Overlay div sits on top of the first page canvas */
    #yt-overlay {
      position: absolute;
      top: 10%;       /* adjust to align with your PDF layout */
      left: 5%;       /* adjust to align with your PDF layout */
      width: 42%;     /* adjust width as needed */
      aspect-ratio: 16 / 9;
      z-index: 9999;
      display: none;  /* hidden until flipbook is ready */
    }

    #yt-player-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="flipbook-wrapper">

  <!-- DearFlip flipbook -->
  <div class="_df_book" id="my_flipbook"></div>

  <!-- YouTube overlay (positioned on top of page 1) -->
  <div id="yt-overlay">
    <div id="yt-player-container"></div>
  </div>

</div>

<!-- DearFlip JS (use plain JS/HTML as stated in repo, not jQuery methods) -->
<script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/js/libs/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook/dflip/js/dflip.min.js"></script>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  // ── 1. DearFlip config ─────────────────────────────────────────
  // Name the variable option_ + the element id
  var option_my_flipbook = {
    source: 'example-assets/books/serotine.pdf', // ← replace with your PDF filename or full URL
    webgl: true
  };

  // ── 2. YouTube IFrame API ──────────────────────────────────────
  var ytPlayer = null;
  var ytReady  = false;

  // Called automatically by YouTube once iframe_api script loads
  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-player-container', {
      videoId: '7sxWN7eT5l0',   // video ID from your URL
      playerVars: {
        start:          5,       // matches &t=5s from your URL
        autoplay:       0,
        rel:            0,
        modestbranding: 1
      },
      events: {
        onReady: function () {
          ytReady = true;
        }
      }
    });
  }

  // ── 3. Show/hide overlay based on current page ─────────────────
  function updateOverlay(pageNumber) {
    var overlay = document.getElementById('yt-overlay');
    if (pageNumber === 1) {
      overlay.style.display = 'block';
    } else {
      overlay.style.display = 'none';
      // Pause video when user flips away from page 1
      if (ytReady && ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
        ytPlayer.pauseVideo();
      }
    }
  }

  // ── 4. DearFlip callbacks ──────────────────────────────────────
  // Fires once the PDF finishes loading
  DFLIP.defaults.onReady = function (app) {
    updateOverlay(app.currentPageNumber);
  };

  // Fires every time a page is flipped
  DFLIP.defaults.onPageChanged = function (app) {
    updateOverlay(app.currentPageNumber);
  };
</script>

</body>
</html>
